name: Inject JSON-LD Schema

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  inject-schema:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run schema injection
        run: node inject-schema.js

      - name: Commit changes
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add -A
          git diff --staged --quiet || git commit -m "Auto: Inject JSON-LD schema"
          git push
