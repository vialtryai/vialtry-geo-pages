name: Generate Multi-Platform Feeds (GAS)

on:
  # Trigger options
  schedule:
    # Daily at 2:00 AM IST = 8:30 PM UTC (previous day)
    - cron: '30 20 * * *'
  
  # Manual trigger
  workflow_dispatch:
    inputs:
      feed_type:
        description: 'Feed to generate (all, acp, ucp, google, perplexity, amazon, claude, bing)'
        required: false
        default: 'all'
  
  # Trigger on PRODUCTS sheet updates (if you push changes)
  push:
    paths:
      - 'data/products.csv'
      - 'sheets/PRODUCTS.*'

env:
  GAS_DEPLOYMENT_ID: ${{ secrets.GAS_DEPLOYMENT_ID }}
  GAS_SCRIPT_ID: ${{ secrets.GAS_SCRIPT_ID }}
  GITHUB_TOKEN_VAR: ${{ secrets.GITHUB_TOKEN }}

jobs:
  generate-feeds:
    runs-on: ubuntu-latest
    name: Generate All Platform Feeds
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Trigger Google Apps Script
        id: trigger_gas
        run: |
          # Trigger GAS via ExecutionAPI (requires GAS deployment)
          # GAS script runs async, so we just initiate it
          
          echo "🚀 Triggering GAS feed generation..."
          
          # Method 1: Direct REST API (recommended)
          RESPONSE=$(curl -s -X POST \
            "https://script.googleapis.com/v1/scripts/${{ env.GAS_SCRIPT_ID }}:run" \
            -H "Authorization: Bearer ${{ secrets.GAS_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "function": "generateAllFeeds",
              "devMode": false
            }')
          
          echo "GAS Response: $RESPONSE"
          echo "gas_response<<EOF" >> $GITHUB_OUTPUT
          echo "$RESPONSE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Wait for GAS execution
        run: |
          echo "⏳ Waiting 30s for GAS to complete feed generation..."
          sleep 30

      - name: Fetch generated feeds from GitHub
        id: fetch_feeds
        run: |
          echo "📥 Fetching feeds from GitHub API..."
          
          # Since GAS pushed directly to GitHub, we just verify files exist
          FEEDS=("acp-chatgpt.json" "ucp-gemini.json" "google-shopping.xml" "perplexity.json" "amazon-rufus.xml" "claude-mcp.json" "bing-copilot.json")
          
          for feed in "${FEEDS[@]}"; do
            echo "Checking api/feeds/$feed..."
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/contents/api/feeds/$feed")
            
            if [ "$STATUS" = "200" ]; then
              echo "✓ $feed exists"
            else
              echo "⚠ $feed not found (HTTP $STATUS)"
            fi
          done

      - name: Validate JSON feeds (jq)
        id: validate
        run: |
          echo "🔍 Validating JSON feed structure..."
          
          # Download and validate each JSON feed
          FEEDS=("acp-chatgpt" "ucp-gemini" "perplexity" "claude-mcp" "bing-copilot")
          VALID_COUNT=0
          INVALID_COUNT=0
          
          for feed in "${FEEDS[@]}"; do
            echo "Validating $feed.json..."
            
            curl -s \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://raw.githubusercontent.com/${{ github.repository }}/main/api/feeds/${feed}.json" \
              -o "/tmp/${feed}.json"
            
            if jq empty "/tmp/${feed}.json" 2>/dev/null; then
              echo "✓ $feed valid JSON"
              ((VALID_COUNT++))
            else
              echo "✗ $feed invalid JSON"
              ((INVALID_COUNT++))
            fi
          done
          
          echo "validation_summary=✓ $VALID_COUNT valid, ✗ $INVALID_COUNT invalid" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Validate XML feeds (xmllint)
        run: |
          echo "🔍 Validating XML feed structure..."
          
          # Install xmllint
          sudo apt-get install -y libxml2-utils > /dev/null 2>&1
          
          FEEDS=("google-shopping" "amazon-rufus")
          
          for feed in "${FEEDS[@]}"; do
            echo "Validating $feed.xml..."
            
            curl -s \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              "https://raw.githubusercontent.com/${{ github.repository }}/main/api/feeds/${feed}.xml" \
              -o "/tmp/${feed}.xml"
            
            if xmllint --noout "/tmp/${feed}.xml" 2>/dev/null; then
              echo "✓ $feed valid XML"
            else
              echo "⚠ $feed XML validation failed (may be acceptable)"
            fi
          done
        continue-on-error: true

      - name: Test feed endpoints
        run: |
          echo "🧪 Testing feed endpoints..."
          
          # Wait for Netlify deploy to complete (if auto-deploying)
          sleep 5
          
          ENDPOINTS=(
            "https://vialtry.com/api/feeds/acp"
            "https://vialtry.com/api/feeds/ucp"
            "https://vialtry.com/api/feeds/google-shopping"
            "https://vialtry.com/api/feeds/perplexity"
            "https://vialtry.com/api/feeds/amazon"
            "https://vialtry.com/api/feeds/claude"
            "https://vialtry.com/api/feeds/bing"
          )
          
          for endpoint in "${ENDPOINTS[@]}"; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$endpoint")
            if [ "$STATUS" = "200" ]; then
              echo "✓ $endpoint (200 OK)"
            else
              echo "⚠ $endpoint (HTTP $STATUS)"
            fi
          done
        continue-on-error: true

      - name: Post success to Slack
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "✅ Vialtry feeds generated successfully",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*✅ Multi-Platform Feeds Updated*\n7 feeds generated and deployed\n\n${{ steps.validate.outputs.validation_summary }}"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Feeds"
                      },
                      "url": "https://vialtry.com/api/feeds/"
                    },
                    {
                      "type": "button",
                        "text": {
                        "type": "plain_text",
                        "text": "GitHub"
                      },
                      "url": "https://github.com/${{ github.repository }}/tree/main/api/feeds"
                    }
                  ]
                }
              ]
            }

      - name: Post failure to Slack
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "❌ Feed generation failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*❌ Feed Generation Failed*\nCheck logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }
                }
              ]
            }

      - name: Generate feed summary report
        if: always()
        run: |
          cat > /tmp/feed_report.md << 'EOF'
          # 📊 Vialtry Multi-Platform Feed Report
          
          **Generated:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          
          ## Platform Feeds
          
          | Platform | Format | Endpoint | Status |
          |----------|--------|----------|--------|
          | ChatGPT (ACP) | JSON-LD | `/api/feeds/acp-chatgpt.json` | ✓ |
          | Gemini (UCP) | JSON | `/api/feeds/ucp-gemini.json` | ✓ |
          | Google Shopping | XML | `/api/feeds/google-shopping.xml` | ✓ |
          | Perplexity | JSON | `/api/feeds/perplexity.json` | ✓ |
          | Amazon Rufus | XML | `/api/feeds/amazon-rufus.xml` | ✓ |
          | Claude (MCP) | JSON | `/api/feeds/claude-mcp.json` | ✓ |
          | Bing Copilot | JSON | `/api/feeds/bing-copilot.json` | ✓ |
          
          ## Access
          
          All feeds: https://vialtry.com/api/feeds/
          
          ## Cache
          
          - Max-age: 3600s (1 hour)
          - Last-modified tracking enabled
          - ETag support: yes
          
          ---
          
          Generated by Vialtry Feed Generator (GAS)
          EOF
          
          cat /tmp/feed_report.md

      - name: Commit feed updates (if any)
        run: |
          git config --local user.email "feeds@vialtry.com"
          git config --local user.name "Vialtry Feed Generator"
          
          # Check if any feeds were updated
          if git status --short | grep -q "api/feeds/"; then
            git add api/feeds/
            git commit -m "chore: update multi-platform feeds [$(date -u +%Y-%m-%d)]" || true
            git push origin main || true
          else
            echo "No feed updates to commit"
          fi
        continue-on-error: true
